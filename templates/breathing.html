<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>1-Minute Breathing Exercise | StressCheck</title>

    <!-- Optional: Bootstrap for consistent fonts/buttons (not required for logic) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ---------- Page background ---------- */
        body {
            margin: 0;
            padding: 40px 10px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 20% 20%, #1f3b70 0, #020817 55%, #01040b 100%);
            font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            color: #f7f9ff;
        }

        /* ---------- Main card ---------- */
        .breathing-card {
            position: relative;
            width: 520px;
            max-width: 100%;
            padding: 32px 32px 26px;
            background: radial-gradient(circle at top, #111827 0, #020617 65%);
            border-radius: 28px;
            box-shadow:
                    0 24px 60px rgba(0, 0, 0, 0.65),
                    0 0 0 1px rgba(148, 163, 184, 0.15);
            text-align: center;
            overflow: hidden;
        }

        /* Yoga silhouette watermark */
        .breathing-card::before {
            content: "";
            position: absolute;
            inset: 35% -5% -10% -5%;
            background: url("https://cdn-icons-png.flaticon.com/512/4149/4149675.png")
                        no-repeat center bottom;
            background-size: 55%;
            opacity: 0.04;              /* very subtle */
            filter: grayscale(100%);
            pointer-events: none;
            z-index: 0;
        }

        .breathing-card * {
            position: relative;
            z-index: 1;  /* ensure content is above watermark */
        }

        /* ---------- Top Back button ---------- */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            background: rgba(15, 23, 42, 0.8);
            color: #e5edff;
            font-size: 14px;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(30, 64, 175, 0.9);
            border-color: rgba(191, 219, 254, 0.9);
        }

        /* ---------- Headings ---------- */
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 18px 0 6px;
            letter-spacing: 0.02em;
        }

        .subtitle {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 22px;
        }

        /* ---------- Circle + glow ---------- */
        .circle-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 8px 0 16px;
        }

        .breathing-circle {
            width: 230px;
            height: 230px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 20%, #93c5fd 0, #3b82f6 40%, #1d4ed8 100%);
            box-shadow:
                0 0 40px rgba(59, 130, 246, 0.45),
                0 0 120px rgba(59, 130, 246, 0.25);
            animation: breathe 12s ease-in-out infinite;
        }

        @keyframes breathe {
            0%   { transform: scale(0.82); }
            33%  { transform: scale(1.08); }  /* inhale (0–4s) */
            50%  { transform: scale(1.08); }  /* hold (4–6s) */
            100% { transform: scale(0.82); }  /* exhale (6–12s) */
        }

        /* ---------- Text below circle ---------- */
        #breath-phase {
            font-size: 22px;
            font-weight: 600;
            margin-top: 6px;
        }

        #breath-instruction {
            font-size: 14px;
            color: #cbd5f5;
            margin-top: 4px;
        }

        .protocol {
            margin-top: 26px;
            font-size: 12px;
            color: #9ca3af;
        }

        /* ---------- Responsive tweaks ---------- */
        @media (max-width: 600px) {
            .breathing-card {
                padding: 24px 20px 20px;
            }
            .breathing-circle {
                width: 190px;
                height: 190px;
            }
        }
    </style>
</head>

<body>

<div class="breathing-card">
    <a href="/" class="back-btn">
        &#8592; Back to Home
    </a>

    <h1>1-Minute Breathing Exercise</h1>
    <p class="subtitle">
        Follow the circle: inhale, hold, and exhale with the rhythm.
    </p>

    <div class="circle-wrapper">
        <div class="breathing-circle"></div>
    </div>

    <div id="breath-phase">Inhale...</div>
    <p id="breath-instruction">Breathe in slowly through your nose.</p>

    <p class="protocol">
        4&nbsp;s inhale &bull; 2&nbsp;s hold &bull; 6&nbsp;s exhale — repeat gently.
        This is an awareness tool, not a medical device.
    </p>
</div>

<script>
    // Text phases synced with the 12s animation cycle
    const phases = [
        {
            label: "Inhale...",
            instruction: "Breathe in slowly through your nose.",
            duration: 4000   // 0–4 s
        },
        {
            label: "Hold...",
            instruction: "Gently hold your breath.",
            duration: 2000   // 4–6 s
        },
        {
            label: "Exhale...",
            instruction: "Exhale softly through your mouth.",
            duration: 6000   // 6–12 s
        }
    ];

    const phaseEl = document.getElementById("breath-phase");
    const instructionEl = document.getElementById("breath-instruction");

    let phaseIndex = 0;

    function runPhase() {
        const current = phases[phaseIndex];
        phaseEl.textContent = current.label;
        instructionEl.textContent = current.instruction;

        setTimeout(() => {
            phaseIndex = (phaseIndex + 1) % phases.length;
            runPhase();
        }, current.duration);
    }

    // Start the text cycle when the page loads
    window.addEventListener("load", runPhase);
</script>

</body>
</html>
