<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Psychological Inputs | StressCheck</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ICONS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2ff, #f7faff);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .step-wrapper {
            width: 1000px;
            max-width: 95%;
            background: #fff;
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 10px 35px rgba(0,0,0,0.08);
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .left-panel {
            flex: 0.8; 
            background: linear-gradient(135deg, #45aaf2, #2d98da);
            padding: 45px 35px;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .left-panel img {
            width: 65%;
            margin: 0 auto 25px;
        }

        .left-panel h2 {
            font-weight: 700;
            line-height: 1.3;
        }

        .left-panel p {
            opacity: 0.9;
            margin-top: 12px;
            font-size: 15px;
        }

        .right-panel {
            flex: 1.2;
            padding: 45px 40px;
            position: relative;
        }

        .back-btn {
            margin-bottom: 15px;
            background: #f0f4ff !important;
            border: 1px solid #c7d3ff !important;
            color: #3f5bcc !important;
            font-weight: 500;
            border-radius: 8px;
        }

        .back-btn:hover {
            background: #e3eaff !important;
        }

        .step-indicator {
            font-size: 14px;
            color: #777;
            text-align: center;
            margin-bottom: 5px;
        }

        h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .input-group-text {
            background: #f1f5ff;
            border-radius: 10px 0 0 10px;
        }

        .form-control, .form-select {
            border-radius: 0 10px 10px 0;
            padding: 10px 12px;
        }

        .calc-link {
            font-size: 13px;
            color: #3f5bcc;
            text-decoration: underline;
            cursor: pointer;
            display: block;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .btn-submit {
            background: #4b7bec;
            color: white;
            width: 100%;
            padding: 13px;
            font-size: 16px;
            border-radius: 12px;
            margin-top: 25px;
            font-weight: 600;
        }

        .btn-submit:hover {
            background: #3867d6;
        }

        @media (max-width: 900px) {
            .step-wrapper {
                flex-direction: column;
            }

            .left-panel {
                padding: 35px;
            }

            .right-panel {
                padding: 35px 25px;
            }

            .left-panel img {
                width: 45%;
            }
        }
    </style>
</head>

<body>

<div class="step-wrapper">

    <div class="left-panel">
        <img src="https://cdn-icons-png.flaticon.com/512/4208/4208494.png" alt="psychology image">
        <h2>Understanding Your Mind</h2>
        <p>
            These inputs help our machine learning model detect patterns  
            related to stress, anxiety, and emotional well-being.
        </p>
    </div>

    <div class="right-panel">

        <a href="/details" class="btn back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back
        </a>

        <div class="step-indicator">Step 2 of 3</div>
        <h2>Psychological Inputs</h2>

        <form action="/result" method="POST">

            <!-- HIDDEN STEP-1 DATA -->
            <input type="hidden" name="age" value="{{ data.age if data else '' }}">
            <input type="hidden" name="gender" value="{{ data.gender if data else '' }}">
            <input type="hidden" name="sleep_hours" value="{{ data.sleep_hours if data else '' }}">
            <input type="hidden" name="work_hours" value="{{ data.work_hours if data else '' }}">

            <!-- ANXIETY SCORE -->
            <label class="form-label fw-semibold">Anxiety Score (1–10)</label>
<div class="input-group mb-1">
    <span class="input-group-text"><i class="fa-solid fa-brain"></i></span>
    <input type="number" step="1" min="1" max="10"
           class="form-control"
           name="anxiety_score"
           value="{{ anxiety_score if anxiety_score else '' }}"
           required>
</div>

<a href="/calculate-anxiety" class="calc-link">
    Don't know? Calculate anxiety score here
</a>

            <!-- DEPRESSION SCORE -->
            <label class="form-label fw-semibold">Depression Score (1–10)</label>
<div class="input-group mb-1">
    <span class="input-group-text"><i class="fa-solid fa-face-frown"></i></span>
    <input type="number" step="1" min="1" max="10"
           class="form-control"
           name="depression_score"
           value="{{ depression_score if depression_score else '' }}"
           required>
</div>

<a href="/calculate-depression" class="calc-link">
    Don't know? Calculate depression score here
</a>
            <!-- SCREEN TIME -->
            <label class="form-label fw-semibold">Screen Time (hours/day)</label>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa-solid fa-mobile-screen"></i></span>
                <input type="number" step="0.1" min="0" max="24" class="form-control" name="screen_time" required>
            </div>

            <!-- PHYSICAL ACTIVITY -->
            <label class="form-label fw-semibold">Physical Activity (hours/day)</label>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa-solid fa-person-walking"></i></span>
                <input type="number" step="0.1" min="0" max="12" class="form-control" name="physical_activity" required>
            </div>

            <!-- MOOD SWINGS -->
            <label class="form-label fw-semibold">Mood Swings</label>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa-solid fa-arrows-spin"></i></span>
                <select class="form-select" name="mood_swings" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <!-- FAMILY HISTORY -->
            <label class="form-label fw-semibold">Family History</label>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa-solid fa-people-group"></i></span>
                <select class="form-select" name="family_history" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <button class="btn-submit">Get Results</button>

        </form>
    </div>
</div>

</body>
</html>
