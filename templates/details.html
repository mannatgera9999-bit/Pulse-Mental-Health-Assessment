<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Details | StressCheck</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ICONS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2ff, #f7faff);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .step-wrapper {
            width: 950px;
            max-width: 95%;
            background: #fff;
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 10px 35px rgba(0,0,0,0.08);
            animation: fadeIn 0.7s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* LEFT ILLUSTRATION PANEL */
        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #4b7bec, #3867d6);
            padding: 40px;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left-panel img {
            width: 75%;
            margin: 0 auto 20px;
        }

        .left-panel h2 {
            font-weight: 700;
        }

        .left-panel p {
            opacity: 0.9;
            margin-top: 10px;
        }

        /* RIGHT FORM */
        .right-panel {
            flex: 1.2;
            padding: 45px 40px;
        }

        .input-group-text {
            background: #f1f3ff;
            border-radius: 8px 0 0 8px;
        }

        .form-control {
            border-radius: 0 8px 8px 0;
            padding: 10px 12px;
        }

        .btn-next {
            background: #4b7bec;
            color: white;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .btn-next:hover {
            background: #3867d6;
        }

        .back-btn {
            margin-bottom: 20px;
        }

        .step-indicator {
            font-size: 14px;
            color: #777;
            text-align: center;
            margin-bottom: 5px;
        }

        h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 25px;
        }
    </style>
</head>

<body>

<div class="step-wrapper">

    <!-- LEFT IMAGE PANEL -->
    <div class="left-panel">
        <img src="https://cdn-icons-png.flaticon.com/512/4139/4139951.png" alt="illustration">
        <h2>Your Basic Wellness Info</h2>
        <p>Help us understand your lifestyle so we can predict stress levels more accurately.</p>
    </div>


    <!-- RIGHT FORM PANEL -->
    <div class="right-panel">

        <a href="/" class="btn btn-light back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>

        <div class="step-indicator">Step 1 of 3</div>
        <h2>Basic Details</h2>

        <form action="/psych" method="POST">

            <!-- AGE -->
            <label class="form-label fw-semibold">Age</label>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa-solid fa-cake-candles"></i></span>
                <input type="number" class="form-control" name="age" min="10" max="100" required>
            </div>

            <!-- GENDER -->
            <label class="form-label fw-semibold">Gender</label>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa-solid fa-venus-mars"></i></span>
                <select class="form-control" name="gender" required>
                    <option value="">Select</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <!-- SLEEP HOURS -->
            <label class="form-label fw-semibold">Sleep Hours per Day</label>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa-solid fa-bed"></i></span>
                <input type="number" step="0.1" class="form-control" name="sleep_hours" min="0" max="24" required>
            </div>

            <!-- WORK HOURS -->
            <label class="form-label fw-semibold">Study/Work Hours per Day</label>
            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fa-solid fa-briefcase"></i></span>
                <input type="number" step="0.1" class="form-control" name="work_hours" min="0" max="24" required>
            </div>

            <!-- NEXT BUTTON -->
            <button class="btn-next">Next</button>

        </form>

    </div>

</div>

</body>
</html>
