<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Pulse+</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0A1224, #112344 40%, #1A3C6E 70%, #2D6AE2 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 10px;
            overflow-x: hidden;
        }

        /* Main Glass Card */
        .glass-box {
            width: 960px;
            max-width: 96%;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 0;
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.12);
            overflow: hidden;
            animation: fadeSlide 1.1s ease-out;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Left Section */
        .left-pane {
            padding: 70px 50px;
            background: linear-gradient(135deg, #1C3A6B 0%, #2D6AE2 100%);
            color: #fff;
            height: 100%;
        }

        .left-pane h2 {
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .left-pane p {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 12px;
        }

        .icon-brain {
            font-size: 48px;
            color: #ffffff;
            margin-bottom: 20px;
        }

        /* Right Section */
        .right-pane {
            padding: 70px 55px;
            background: rgba(255, 255, 255, 0.06);
        }

        .form-label {
            color: #dbe7ff;
        }

        input {
            background: rgba(255,255,255,0.12) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            color: #fff !important;
        }

        input::placeholder {
            color: rgba(255,255,255,0.6) !important;
        }

        /* Neon Login Button */
        .btn-login {
            width: 100%;
            padding: 13px;
            font-size: 17px;
            border-radius: 12px;
            border: none;
            margin-top: 10px;
            background: linear-gradient(135deg, #2D6AE2, #5A8CFF);
            color: #fff;
            font-weight: 600;
            position: relative;
            box-shadow: 0 0 18px rgba(45, 106, 226, 0.6);
            transition: 0.25s ease;
        }

        .btn-login:hover {
            box-shadow: 0 0 25px rgba(90,140,255,0.9);
            transform: translateY(-2px);
        }

        .register-link {
            color: #9fc3ff;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link:hover {
            text-decoration: underline;
        }

        .back-btn {
            font-size: 14px;
            margin-bottom: 25px;
            background: transparent;
            border: none;
            color: #b9ceff;
        }

        .back-btn:hover {
            color: #fff;
        }

        @media(max-width: 880px) {
            .glass-box { flex-direction: column; }
            .left-pane { padding: 40px; text-align: center; }
            .right-pane { padding: 40px; }
        }
    </style>
</head>

<body>

<div class="glass-box d-flex">

    <!-- LEFT -->
    <div class="left-pane col-md-6">
        <i class="fa-solid fa-brain icon-brain"></i>
        <h2>Welcome Back</h2>
        <p>Your journey toward better mental wellness continues.</p>
        <p>Log in to access your insights, track stress, and explore wellness tools.</p>
    </div>

    <!-- RIGHT -->
    <div class="right-pane col-md-6">

        <button class="back-btn" onclick="window.location.href='/'">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </button>

        <h3 class="text-white mb-4">Login</h3>

        {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form method="POST">

            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control mb-3" required>

            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control mb-2" required>

            <button class="btn-login">
                <i class="fa-solid fa-right-to-bracket me-1"></i> Login
            </button>

        </form>

        <p class="mt-3 text-light">
            Don't have an account?
            <a href="{{ url_for('register') }}" class="register-link">Register here</a>
        </p>

    </div>

</div>

</body>
</html>
