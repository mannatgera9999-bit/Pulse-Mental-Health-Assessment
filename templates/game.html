<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stress Bubble Pop | StressCheck</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #2f80ed 0, #141e30 40%, #0b1020 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .game-card {
            width: 1100px;
            max-width: 100%;
            background: rgba(9, 15, 30, 0.94);
            border-radius: 22px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.55);
            padding: 24px;
            color: #f7fbff;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            border-radius: 999px;
            padding: 8px 16px;
            font-size: 14px;
            background: #25345a;
            color: #e3ebff;
            border: 1px solid #4356a6;
        }

        .game-layout {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
        }

        .play-area-wrapper {
            background: radial-gradient(circle at top, #263b6f 0, #111827 55%, #050816 100%);
            border-radius: 18px;
            padding: 14px;
        }

        .play-area {
            position: relative;
            height: 430px;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(5, 9, 28, 0.96);
        }

        @keyframes floatUp {
            0% { transform: translateY(100%); opacity: 0.9; }
            100% { transform: translateY(-120%); opacity: 1; }
        }

        @keyframes pop {
            from { transform: scale(1); opacity: 1; }
            to { transform: scale(1.6); opacity: 0; }
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 14px;
            color: black;
            text-shadow: 0 0 4px rgba(255,255,255,0.9);
            animation: floatUp 3s linear forwards;
        }

        .glow-bubble {
            box-shadow: 0 0 25px rgba(255, 255, 150, 1),
                        0 0 60px rgba(255, 255, 80, 0.9);
            border: 3px solid rgba(255, 235, 120, 0.9);
            background: radial-gradient(circle, #fff9c4, #ffe082, #ffca28, #f9a825);
        }

        .bubble.pop {
            animation: pop 0.25s ease-out forwards;
        }

        .side-panel {
            background: #101526;
            border-radius: 18px;
            padding: 18px;
        }

        .btn-control {
            width: 100%;
            border-radius: 999px;
            padding: 10px;
            font-weight: 600;
            background: #4b7bec;
            color: #fff;
        }

        /* RESULT MODAL */
        #resultModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5,10,30,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-box {
            background: linear-gradient(135deg,#0f1b3d,#1b2b5c);
            padding: 30px;
            border-radius: 20px;
            width: 380px;
            box-shadow: 0 0 30px rgba(75,123,236,0.6);
            text-align: center;
            color: white;
        }

        .modal-box h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .modal-box p {
            font-size: 15px;
            opacity: 0.85;
        }

        .modal-stats {
            text-align: left;
            margin-top: 20px;
            font-size: 16px;
        }

        .modal-total {
            font-size: 20px;
            font-weight: 700;
            margin-top: 10px;
        }

        .modal-btn {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 12px;
            background: #4b7bec;
            color: white;
            font-weight: 600;
            box-shadow: 0 0 15px #4b7bec;
        }
    </style>
</head>

<body>

<div class="game-card">

    <div class="game-header">
        <button class="btn back-btn" onclick="window.location.href='/'">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </button>
        <h2>Pop the Stress Bubbles</h2>
    </div>

    <div class="game-layout">

        <div class="play-area-wrapper">
            <div class="play-area" id="playArea"></div>
        </div>

        <div class="side-panel">
            <p><strong>Score:</strong> <span id="scoreText">0</span></p>
            <p><strong>Time left:</strong> <span id="timeText">30s</span></p>
            <p><strong>Best streak:</strong> <span id="streakText">0</span></p>

            <button class="btn-control" id="startButton">
                <i class="fa-solid fa-circle-play me-1"></i> Start / Restart
            </button>
        </div>

    </div>
</div>

<!-- RESULT MODAL -->
<div id="resultModal">
    <div class="modal-box">
        <h3>⏱️ Time's Up!</h3>
        <p>Your performance summary</p>

        <div class="modal-stats">
            <p>🫧 Bubbles: <strong id="normalScoreText"></strong></p>
            <p>⚡ Stress Triggers: <strong id="specialScoreText"></strong></p>
            <hr style="border-color: rgba(255,255,255,0.2);">
            <p class="modal-total">🎯 Total Score: <span id="totalScoreText"></span></p>
        </div>

        <button class="modal-btn" onclick="closeModal()">Continue</button>
    </div>
</div>

<script>
const playArea = document.getElementById('playArea');
const scoreText = document.getElementById('scoreText');
const timeText = document.getElementById('timeText');
const streakText = document.getElementById('streakText');
const startButton = document.getElementById('startButton');

let score = 0, timeLeft = 30, bestStreak = 0, currentStreak = 0;
let normalScore = 0, specialScore = 0;

let gameInterval = null, timerInterval = null, gameRunning = false;

const bubbleColors = ["#4b7bec","#ff5d8f","#4cd964","#f7c948","#a66cff"];
const negativeWords = ["Stress","Negativity","Sadness","Fear","Overthinking"];

function createBubble() {
    if (!gameRunning) return;

    const bubble = document.createElement('div');
    bubble.classList.add('bubble');

    bubble.style.background = bubbleColors[Math.floor(Math.random()*bubbleColors.length)];

    const size = 50 + Math.random()*70;
    bubble.style.width = size + "px";
    bubble.style.height = size + "px";

    bubble.style.left = Math.random()*(playArea.clientWidth-size) + "px";

    if (Math.random() < 0.10) {
        bubble.classList.add("glow-bubble","special");
        bubble.innerHTML = negativeWords[Math.floor(Math.random()*negativeWords.length)];
    }

    bubble.addEventListener('click', () => {

        if (bubble.classList.contains("special")) {
            specialScore += 2;
            score += 2;
        } else {
            normalScore += 1;
            score += 1;
        }

        scoreText.textContent = score;

        bubble.classList.add("pop");
        setTimeout(() => bubble.remove(), 200);
    });

    setTimeout(() => bubble.remove(),1500);

    playArea.appendChild(bubble);
}

function startGame(){
    score=0; normalScore=0; specialScore=0;
    timeLeft=30;

    scoreText.textContent="0";
    timeText.textContent="30s";

    playArea.innerHTML="";
    gameRunning=true;

    gameInterval=setInterval(()=>createBubble(),500);

    timerInterval=setInterval(()=>{
        timeLeft--;
        timeText.textContent=timeLeft+"s";

        if(timeLeft<=0) endGame();
    },1000);
}

function endGame(){
    gameRunning=false;
    clearInterval(gameInterval);
    clearInterval(timerInterval);

    let total = normalScore + specialScore;

    document.getElementById("normalScoreText").innerText = normalScore + " points";
    document.getElementById("specialScoreText").innerText = specialScore + " points";
    document.getElementById("totalScoreText").innerText = total;

    document.getElementById("resultModal").style.display="flex";
}

function closeModal(){
    document.getElementById("resultModal").style.display="none";
}

startButton.addEventListener("click",startGame);
</script>

</body>
</html>
