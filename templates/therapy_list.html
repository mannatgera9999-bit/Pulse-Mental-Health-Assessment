<!DOCTYPE html>
<html>
<head>
<title>Therapy Options</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: radial-gradient(circle at top, #2f80ed 0, #141e30 50%, #0b1020 100%);
    color:white;
}

.container{
    max-width:1100px;
    margin:60px auto;
    text-align:center;
}

h2{
    font-size:32px;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.card{
    height:120px;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:18px;
    font-weight:500;
    cursor:pointer;
    transition:0.3s;
    border:1px solid rgba(255,255,255,0.1);
}

.card:hover{
    transform:translateY(-5px) scale(1.03);
    box-shadow:0 0 25px rgba(75,123,236,0.6);
}
</style>
</head>

<body>

<div class="container">

<h2>🎧 {{ mode.title() }} Therapy Sessions</h2>

<div class="grid">

{% for i in range(1,10) %}
<div class="card" onclick="play('{{ mode }}','{{ i }}')">
    🎵 Session {{ i }}
</div>
{% endfor %}

</div>

</div>

<script>
function play(mode,id){
    window.location.href="/therapy/"+mode+"/"+id;
}
</script>

</body>
</html>
