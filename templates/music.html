<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Therapy | StressCheck</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: radial-gradient(circle at top, #2f80ed 0, #141e30 40%, #0b1020 100%);
    font-family: 'Segoe UI', sans-serif;
    min-height:100vh;
    color:white;
}

.container-box{
    max-width:1000px;
    margin:80px auto;
    text-align:center;
}

h2{
    margin-bottom:30px;
    font-weight:700;
}

.cards{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.card-box{
    height:220px;
    border-radius:20px;
    background-size:cover;
    background-position:center;
    position:relative;
    cursor:pointer;
    overflow:hidden;
    transition:0.3s;
}

.card-box:hover{
    transform:scale(1.05);
    box-shadow:0 0 30px rgba(75,123,236,0.6);
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.overlay h3{
    font-size:22px;
    font-weight:600;
}

.overlay p{
    font-size:14px;
    opacity:0.8;
}

</style>
</head>

<body>

<div class="container-box">

<h2>🎧 Choose Your Therapy Mode</h2>

<div class="cards">

<div class="card-box" style="background-image:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')" onclick="playMusic('relax')">
    <div class="overlay">
        <h3>🌊 Deep Relaxation</h3>
        <p>Release stress and calm your mind</p>
    </div>
</div>

<div class="card-box" style="background-image:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470')" onclick="playMusic('sleep')">
    <div class="overlay">
        <h3>🌙 Sleep Better</h3>
        <p>Drift into peaceful sleep</p>
    </div>
</div>

<div class="card-box" style="background-image:url('https://images.unsplash.com/photo-1492724441997-5dc865305da7')" onclick="playMusic('focus')">
    <div class="overlay">
        <h3>🎯 Improve Focus</h3>
        <p>Enhance concentration and clarity</p>
    </div>
</div>

<div class="card-box" style="background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')" onclick="playMusic('mood')">
    <div class="overlay">
        <h3>⚡ Boost Mood</h3>
        <p>Feel energized and positive</p>
    </div>
</div>

</div>

</div>

<!-- AUDIO PLAYER -->
<audio id="audioPlayer" controls style="display:none;"></audio>

<script>

function playMusic(type){
    window.location.href = "/therapy/" + type;
}
</script>

</body>
</html>
