<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Pulse+</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #071427, #0a1b34, #0f2342);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .register-box {
            width: 900px;
            max-width: 100%;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.45);
            backdrop-filter: blur(6px);
        }

        /* LEFT PANEL (MATCH LOGIN) */
        .left-panel {
            flex: 1.1;
            padding: 50px;
            background: linear-gradient(135deg, #1c3f6e, #12345c 55%, #0d274e);
            color: white;
        }

        .left-panel h2 {
            font-size: 36px;
            font-weight: 700;
            margin-top: 20px;
        }

        .left-panel p {
            opacity: 0.9;
            font-size: 15px;
        }

        /* RIGHT PANEL */
        .right-panel {
            flex: 1;
            padding: 50px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(14px);
            color: white;
        }

        .right-panel h3 {
            font-weight: 700;
            margin-bottom: 20px;
        }

        .btn-register {
            width: 100%;
            background: linear-gradient(135deg, #4b85ff, #2a6aff);
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.25s;
            color: white;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 22px rgba(80,130,255,0.7);
        }

        .form-control {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.17);
            border-color: #5d8bff;
            color: white;
        }

        a {
            color: #7fb3ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="register-box">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <i class="fa-solid fa-user-plus fa-3x"></i>
        <h2>Create Your Account</h2>
        <p>Join Pulse+ and begin your journey toward better mental wellness.</p>
        <p>Track stress insights, follow progress, and access helpful wellness tools.</p>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <a href="/login" class="mb-3 d-inline-block" style="color:#9bb7ff;">
            <i class="fa-solid fa-arrow-left"></i> Back to Login
        </a>

        <h3>Register</h3>

        <form method="post">
            <label>Username</label>
            <input class="form-control mb-3" name="username" required>

            <label>Password</label>
            <input class="form-control mb-4" type="password" name="password" required>

            <button type="submit" class="btn-register">
                <i class="fa-solid fa-user-plus"></i> Register
            </button>
        </form>

        <p class="mt-3">Already have an account?
            <a href="/login">Login here</a>
        </p>
    </div>

</div>

</body>
</html>
